# =============================================================================
# ClaraVerse Production Docker Compose
# =============================================================================
# Quick start:
#   docker compose -f docker-compose.production.yml up -d
#
# Then open http://localhost:3000 and create your first account.
# The first registered user automatically becomes admin.
#
# All secrets (JWT, encryption keys) are auto-generated on first run
# and persisted in the claraverse-data volume.
#
# Local AI (Ollama / LM Studio):
#   If you have Ollama or LM Studio running on your host machine,
#   ClaraVerse will auto-detect them and add their models automatically.
#   Override URLs: OLLAMA_BASE_URL=http://host.docker.internal:11434
#                  LMSTUDIO_BASE_URL=http://host.docker.internal:1234
# =============================================================================

services:
  claraverse:
    image: ghcr.io/claraverse-space/claraverse:${CLARAVERSE_TAG:-latest}
    container_name: claraverse
    ports:
      - "${CLARAVERSE_PORT:-3000}:3000"
    volumes:
      - claraverse-data:/app/data
      - claraverse-uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database connections (use Docker service names)
      - DATABASE_URL=mysql://claraverse:claraverse@mysql:3306/claraverse?parseTime=true
      - MONGODB_URI=mongodb://mongodb:27017/claraverse
      - REDIS_URL=redis://redis:6379
      - SEARXNG_URL=http://searxng:8080
      - SEARXNG_URLS=http://searxng:8080
      # RAG (Qdrant vector DB + FastEmbed sidecar). Both are optional
      # in the sense that the rest of the app works without them, but
      # the Knowledge tab + search_knowledge tool need both wired.
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDINGS_SERVICE_URL=http://embeddings:8002
      # Frontend serving (all-in-one mode)
      - SERVE_FRONTEND=true
      - FRONTEND_URL=http://localhost:${CLARAVERSE_PORT:-3000}
      - BACKEND_URL=http://localhost:${CLARAVERSE_PORT:-3000}
      - ALLOWED_ORIGINS=*
      # Local AI providers (auto-detected — override if using non-default ports)
      # - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # - LMSTUDIO_BASE_URL=http://host.docker.internal:1234
      # Optional: Set these to use specific keys instead of auto-generated ones
      # - JWT_SECRET=your-secret-here
      # - ENCRYPTION_MASTER_KEY=your-key-here
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      # Note: NOT depending on `embeddings` — its first boot downloads
      # ~140 MB of ONNX models which can take 30-60s. We don't want
      # the backend wedged waiting. The RAG service gracefully reports
      # "embeddings unavailable" until the sidecar warms up.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - claraverse

  mongodb:
    image: mongo:7
    container_name: claraverse-mongodb
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=claraverse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - claraverse

  mysql:
    image: mysql:8.0
    container_name: claraverse-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: claraverse
      MYSQL_DATABASE: claraverse
      MYSQL_USER: claraverse
      MYSQL_PASSWORD: claraverse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - claraverse

  redis:
    image: redis:7-alpine
    container_name: claraverse-redis
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    networks:
      - claraverse

  # Qdrant — vector DB backing the per-project Knowledge bases (RAG).
  # One collection per project (kb_<project_oid>). Hybrid dense+sparse
  # vectors with payload-filtered search. See docs/RAG.md.
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: claraverse-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - claraverse

  # Embeddings sidecar — FastAPI wrapper around FastEmbed (Qdrant Inc).
  # Hosts the dense embedder (bge-small-en-v1.5, 384d), sparse BM25,
  # and bge-reranker-base cross-encoder. First boot downloads ~140 MB
  # of ONNX weights into a volume; subsequent restarts are fast.
  embeddings:
    image: ghcr.io/claraverse-space/claraverse-embeddings:${CLARAVERSE_TAG:-latest}
    build:
      context: ./backend/embeddings-service
      dockerfile: Dockerfile
    container_name: claraverse-embeddings
    environment:
      - EMBEDDINGS_DENSE_MODEL=${EMBEDDINGS_DENSE_MODEL:-BAAI/bge-small-en-v1.5}
      - EMBEDDINGS_SPARSE_MODEL=${EMBEDDINGS_SPARSE_MODEL:-Qdrant/bm25}
      - EMBEDDINGS_RERANK_MODEL=${EMBEDDINGS_RERANK_MODEL:-BAAI/bge-reranker-base}
      - EMBEDDINGS_PRELOAD_RERANKER=${EMBEDDINGS_PRELOAD_RERANKER:-false}
    volumes:
      - embeddings-cache:/root/.cache/fastembed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health').read()"]
      interval: 30s
      timeout: 10s
      start_period: 90s  # Cold start downloads model weights
      retries: 3
    networks:
      - claraverse

  searxng:
    image: searxng/searxng:latest
    container_name: claraverse-searxng
    volumes:
      - searxng-config:/etc/searxng
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Write optimized settings on first run (disable limiter for internal use)
        if [ ! -f /etc/searxng/settings.yml ]; then
          cat > /etc/searxng/settings.yml <<'SETTINGS'
        use_default_settings: true
        server:
          limiter: false
          secret_key: "claraverse-searxng-$(head -c 16 /dev/urandom | od -A n -t x1 | tr -d ' \n')"
          image_proxy: true
        search:
          formats:
            - html
            - json
          autocomplete: "duckduckgo"
        SETTINGS
        fi
        exec /usr/local/searxng/entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    networks:
      - claraverse

volumes:
  claraverse-data:
  claraverse-uploads:
  mongodb-data:
  mysql-data:
  redis-data:
  searxng-config:
  qdrant-data:
  embeddings-cache:

networks:
  claraverse:
    driver: bridge
